version: "1"
status: planned
ame: kaggle-source-plane
purpose: >
  Kaggle source declarations. Current production loader uses public GitHub TSV
  Jeopardy data and does not require Kaggle credentials. Future Kaggle datasets
  should be declared here with dataset slug, license, local cache path, and
  transform contract.

rules:
  - Keep Kaggle credentials out of this repository.
  - Store dataset slug, expected files, checksum, license, and transform function.
  - Prefer source manifests over committing raw Kaggle archives.
